<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>VibeCast - Travel Guide</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;500;600;700&family=Inter:wght@400;500;600&family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        "primary": "#c084fc",
                        "primary-dark": "#a855f7",
                        "accent": "#f472b6",
                        "surface": "#1a1028",
                    },
                    fontFamily: {
                        "display": ["Lexend", "sans-serif"],
                        "body": ["Inter", "sans-serif"],
                    },
                },
            },
        }
    </script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(180deg, #1a0f2e 0%, #0f0a1a 50%, #0d0816 100%);
            color: #ffffff;
            min-height: 100vh;
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.08);
        }
        .section-title {
            font-family: 'Lexend', sans-serif;
            font-weight: 700;
            font-size: 22px;
            color: white;
            margin-bottom: 16px;
        }
        .cat-btn {
            padding: 8px 16px;
            border-radius: 10px;
            font-size: 12px;
            font-weight: 600;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.08);
            color: rgba(255, 255, 255, 0.7);
            cursor: pointer;
            transition: all 0.3s;
        }
        .cat-btn:hover, .cat-btn.active {
            background: rgba(34, 197, 94, 0.2);
            border-color: rgba(34, 197, 94, 0.3);
            color: #22c55e;
        }
        .page-hero {
            display: grid;
            grid-template-columns: 1fr auto;
            gap: 24px;
            align-items: center;
            padding: 32px 0;
        }
        @media (max-width: 768px) {
            .page-hero { grid-template-columns: 1fr; }
        }
        .page-weather-badge {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 6px 14px;
            background: rgba(34, 197, 94, 0.15);
            border: 1px solid rgba(34, 197, 94, 0.25);
            border-radius: 20px;
            font-size: 11px;
            font-weight: 600;
            color: #22c55e;
            margin-bottom: 12px;
        }
        .page-title {
            font-family: 'Lexend', sans-serif;
            font-weight: 700;
            font-size: 36px;
            line-height: 1.2;
            color: white;
            margin-bottom: 8px;
        }
        @media (max-width: 768px) {
            .page-title { font-size: 28px; }
        }
        .page-desc {
            font-size: 14px;
            color: rgba(255, 255, 255, 0.5);
            max-width: 500px;
            line-height: 1.6;
        }
        .page-filters {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }
        .items-grid {
            display: grid;
            grid-template-columns: repeat(1, 1fr);
            gap: 20px;
            padding: 24px 0 48px;
        }
        @media (min-width: 640px) {
            .items-grid { grid-template-columns: repeat(2, 1fr); }
        }
        @media (min-width: 1024px) {
            .items-grid { grid-template-columns: repeat(3, 1fr); }
        }
        .item-card {
            display: block;
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.06);
            border-radius: 18px;
            overflow: hidden;
            text-decoration: none;
            transition: all 0.3s ease;
        }
        .item-card:hover {
            transform: translateY(-6px);
            box-shadow: 0 16px 40px rgba(0, 0, 0, 0.3);
            border-color: rgba(34, 197, 94, 0.3);
        }
        .item-card-img-wrapper {
            position: relative;
            overflow: hidden;
            height: 220px;
        }
        .item-card-img-wrapper img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.5s ease;
        }
        .item-card:hover .item-card-img-wrapper img {
            transform: scale(1.08);
        }
        .item-card-tag {
            position: absolute;
            top: 12px;
            left: 12px;
            padding: 4px 10px;
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(8px);
            border-radius: 6px;
            font-size: 9px;
            font-weight: 700;
            letter-spacing: 0.1em;
            color: white;
        }
        .item-card-info {
            padding: 16px;
        }
        .item-card-title {
            font-family: 'Lexend', sans-serif;
            font-weight: 600;
            font-size: 16px;
            color: white;
            margin-bottom: 6px;
        }
        .item-card-desc {
            font-size: 12px;
            color: rgba(255, 255, 255, 0.45);
            line-height: 1.5;
            margin-bottom: 12px;
        }
        .item-card-cta {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 8px 16px;
            background: rgba(34, 197, 94, 0.15);
            border: 1px solid rgba(34, 197, 94, 0.25);
            border-radius: 8px;
            font-size: 11px;
            font-weight: 600;
            color: #22c55e;
            transition: all 0.3s;
        }
        .item-card:hover .item-card-cta {
            background: rgba(34, 197, 94, 0.25);
        }
        footer {
            background: rgba(0, 0, 0, 0.3);
            border-top: 1px solid rgba(255, 255, 255, 0.05);
        }
    </style>
</head>
<body>

    <!-- HEADER -->
    <header class="fixed top-0 left-0 right-0 z-50" style="background: rgba(15, 10, 26, 0.85); backdrop-filter: blur(12px); border-bottom: 1px solid rgba(255,255,255,0.05);">
        <div class="max-w-7xl mx-auto px-5 md:px-12 h-14 flex items-center justify-between">
            <a href="/vibecast/" class="flex items-center gap-2">
                <div class="w-8 h-8 rounded-lg bg-primary flex items-center justify-center">
                    <span class="material-symbols-outlined text-white text-[16px]">cloud</span>
                </div>
                <span class="font-display font-bold text-sm text-white">VibeCast</span>
            </a>
            <nav class="hidden md:flex items-center gap-6">
                <a class="text-white/50 hover:text-primary transition-colors text-xs font-medium" href="/vibecast/">Home</a>
                <a class="text-white/50 hover:text-primary transition-colors text-xs font-medium" href="outfit.html">Outfit</a>
                <a class="text-white/50 hover:text-primary transition-colors text-xs font-medium" href="food.html">Food</a>
            </nav>
            <div class="flex items-center gap-2">
                <a href="/vibecast/" class="w-8 h-8 rounded-lg flex items-center justify-center hover:bg-white/10 transition-colors" title="Back to Home">
                    <span class="material-symbols-outlined text-white/70 text-[18px]">home</span>
                </a>
            </div>
        </div>
    </header>

    <main class="max-w-7xl mx-auto px-5 md:px-12 pt-20">

        <!-- PAGE HERO -->
        <section class="page-hero">
            <div>
                <div class="page-weather-badge" id="travel-weather-badge">
                    <span class="material-symbols-outlined text-[14px]" id="travel-weather-icon">flight</span>
                    <span id="travel-weather-text">Loading...</span>
                </div>
                <h1 class="page-title">Weekend Travel Guide</h1>
                <p class="page-desc" id="travel-page-desc">Curated travel destinations based on current weather conditions near you.</p>
            </div>
            <div class="page-filters">
                <button class="cat-btn active" data-category="hot">Hot</button>
                <button class="cat-btn" data-category="rainy">Rainy</button>
                <button class="cat-btn" data-category="cold">Cold</button>
            </div>
        </section>

        <!-- ITEMS GRID -->
        <section>
            <div class="items-grid" id="travel-grid-page">
                <!-- Injected by JS -->
            </div>
        </section>

    </main>

    <!-- FOOTER -->
    <footer>
        <div class="max-w-7xl mx-auto px-5 md:px-12 py-12">
            <div class="flex flex-col md:flex-row items-center justify-between gap-4">
                <div class="flex items-center gap-2">
                    <div class="w-8 h-8 rounded-lg bg-primary flex items-center justify-center">
                        <span class="material-symbols-outlined text-white text-[16px]">cloud</span>
                    </div>
                    <span class="font-display font-bold text-white">VibeCast</span>
                </div>
                <p class="text-xs text-white/30">&copy; 2024 VibeCast. All rights reserved.</p>
            </div>
        </div>
    </footer>

    <script src="js/app.js?v=3"></script>
    <script>
        let currentCategory = 'hot';

        function updateTravelPage(category) {
            currentCategory = category;
            renderTravelPage(category);

            document.querySelectorAll('.cat-btn').forEach(btn => {
                btn.classList.toggle('active', btn.dataset.category === category);
            });

            const descriptions = {
                hot: "Beach and coastal destinations to cool off in the heat.",
                rainy: "Hill stations and valleys to enjoy the monsoon vibes.",
                cold: "Mountain retreats with snow-capped peaks and warm hospitality."
            };
            const titles = {
                hot: "Beach Destinations",
                rainy: "Hill Station Escapes",
                cold: "Mountain Adventures"
            };

            const text = document.getElementById('travel-weather-text');
            const icon = document.getElementById('travel-weather-icon');
            const desc = document.getElementById('travel-page-desc');
            if (text) text.textContent = titles[category] || "Travel Destinations";
            if (desc) desc.textContent = descriptions[category] || "";
            if (icon) {
                icon.textContent = category === 'hot' ? 'beach_access' : category === 'rainy' ? 'park' : 'snowing';
            }
        }

        document.querySelectorAll('.cat-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                updateTravelPage(btn.dataset.category);
            });
        });

        function waitForWeather() {
            if (window.VibeCastWeather) {
                updateTravelPage(window.VibeCastWeather.category);
            } else {
                setTimeout(waitForWeather, 200);
            }
        }
        waitForWeather();
    </script>
</body>
</html>
